<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liseuse — lecteur PDF sombre</title>
<style>
  :root{
    --bg:#141216;
    --panel:#1e1b21;
    --panel-2:#262229;
    --border:#2c2830;
    --text:#d8d3da;
    --muted:#8a8390;
    --accent:#a10e2f;
    --accent-hover:#c0152a;
    --radius:10px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:var(--bg);
    color:var(--text);
    font:14px/1.5 system-ui,-apple-system,"Segoe UI",sans-serif;
    display:flex;flex-direction:column;
    overflow:hidden;
  }

  /* ---------- Barre supérieure ---------- */
  header{
    display:flex;align-items:center;gap:14px;flex-wrap:wrap;
    padding:10px 16px;
    background:var(--panel);
    border-bottom:1px solid var(--border);
    z-index:10;
  }
  .wordmark{
    font-weight:700;letter-spacing:.04em;font-size:15px;
    color:var(--text);white-space:nowrap;
  }
  .wordmark::before{
    content:"";display:inline-block;width:9px;height:9px;border-radius:50%;
    background:var(--accent);margin-right:8px;vertical-align:baseline;
  }
  .group{display:flex;align-items:center;gap:6px}
  .sep{width:1px;height:22px;background:var(--border)}

  button{
    background:var(--panel-2);color:var(--text);
    border:1px solid var(--border);border-radius:var(--radius);
    padding:6px 12px;font:inherit;cursor:pointer;
    transition:background .12s,border-color .12s;
  }
  button:hover{background:#2f2a33}
  button:focus-visible,input:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
  button.primary{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}
  button.primary:hover{background:var(--accent-hover)}
  button[aria-pressed="true"]{background:var(--accent);border-color:var(--accent);color:#fff}
  button:disabled{opacity:.4;cursor:default}

  .pageinfo{color:var(--muted);min-width:86px;text-align:center;font-variant-numeric:tabular-nums}
  #zoomLevel{color:var(--muted);min-width:52px;text-align:center;font-variant-numeric:tabular-nums}

  /* ---------- Le variateur (signature) ---------- */
  .dimmer{
    display:flex;align-items:center;gap:10px;
    background:var(--panel-2);border:1px solid var(--border);
    border-radius:999px;padding:5px 14px 5px 10px;
  }
  .dimmer .modes{display:flex;gap:4px}
  .dimmer .modes button{border-radius:999px;padding:4px 11px;font-size:13px}
  .dimmer label{color:var(--muted);font-size:12px;white-space:nowrap}
  input[type="range"]{
    -webkit-appearance:none;appearance:none;
    width:110px;height:4px;border-radius:2px;
    background:linear-gradient(to right,#3a3440,#6d6675);
    cursor:pointer;
  }
  input[type="range"]::-webkit-slider-thumb{
    -webkit-appearance:none;appearance:none;
    width:16px;height:16px;border-radius:50%;
    background:var(--accent);border:2px solid #f0e9ee;
  }
  input[type="range"]::-moz-range-thumb{
    width:14px;height:14px;border-radius:50%;
    background:var(--accent);border:2px solid #f0e9ee;
  }

  /* ---------- Zone de lecture ---------- */
  #viewer{
    flex:1;overflow:auto;
    scroll-behavior:auto;
    padding:24px 0 60px;
  }
  .page-wrap{
    margin:0 auto 18px;
    position:relative;
    box-shadow:0 4px 24px rgba(0,0,0,.5);
    background:#1a171d;
  }
  .page-wrap canvas{display:block;width:100%;height:100%}

  /* Filtres appliqués aux canvas selon le mode */
  #viewer[data-mode="sombre"] canvas{
    filter:invert(0.93) hue-rotate(180deg) brightness(var(--lum)) contrast(0.96);
  }
  #viewer[data-mode="tamise"] canvas{
    filter:sepia(0.22) brightness(calc(var(--lum) * 0.92)) contrast(0.95);
  }
  #viewer[data-mode="original"] canvas{
    filter:brightness(var(--lum));
  }

  /* ---------- Écran d'accueil ---------- */
  #dropzone{
    flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:18px;text-align:center;padding:24px;
  }
  #dropzone .halo{
    width:120px;height:120px;border-radius:50%;
    background:radial-gradient(circle at 40% 35%, #3a1620, #141216 70%);
    border:1px solid var(--border);
    display:flex;align-items:center;justify-content:center;
    font-size:42px;
  }
  #dropzone h1{font-size:20px;font-weight:600}
  #dropzone p{color:var(--muted);max-width:420px}
  #dropzone.dragover .halo{border-color:var(--accent);box-shadow:0 0 0 6px rgba(161,14,47,.18)}

  #fileInput{display:none}
  .hidden{display:none !important}

  @media (max-width:760px){
    header{gap:8px;padding:8px 10px}
    .wordmark{display:none}
    input[type="range"]{width:80px}
  }
  @media (prefers-reduced-motion: reduce){
    *{transition:none !important}
  }
</style>
</head>
<body>

<header>
  <span class="wordmark">Liseuse</span>

  <div class="group">
    <button id="openBtn" class="primary">Ouvrir un PDF</button>
  </div>

  <div class="sep"></div>

  <div class="group">
    <button id="prevBtn" title="Page précédente (←)">←</button>
    <span class="pageinfo"><span id="pageNum">–</span> / <span id="pageCount">–</span></span>
    <button id="nextBtn" title="Page suivante (→)">→</button>
  </div>

  <div class="sep"></div>

  <div class="group">
    <button id="zoomOut" title="Zoom arrière (-)">−</button>
    <span id="zoomLevel">–</span>
    <button id="zoomIn" title="Zoom avant (+)">+</button>
    <button id="fitWidth" title="Ajuster à la largeur (0)">Largeur</button>
  </div>

  <div class="sep"></div>

  <div class="dimmer" role="group" aria-label="Réglage de lumière">
    <div class="modes">
      <button data-mode="sombre" aria-pressed="true">Sombre</button>
      <button data-mode="tamise" aria-pressed="false">Tamisé</button>
      <button data-mode="original" aria-pressed="false">Original</button>
    </div>
    <label for="lum">Lumière</label>
    <input type="range" id="lum" min="55" max="100" value="85" aria-label="Intensité lumineuse">
  </div>
</header>

<div id="dropzone">
  <div class="halo">📄</div>
  <h1>Dépose un PDF ici</h1>
  <p>Ou clique sur « Ouvrir un PDF ». Tout se passe dans ton navigateur :
     le fichier n'est envoyé nulle part. Mode sombre par défaut, luminosité réglable,
     zoom sans perte de netteté.</p>
  <button class="primary" id="openBtn2">Ouvrir un PDF</button>
</div>

<div id="viewer" class="hidden" data-mode="sombre" tabindex="0"></div>

<input type="file" id="fileInput" accept="application/pdf">

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
  "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

const viewer   = document.getElementById("viewer");
const dropzone = document.getElementById("dropzone");
const fileInput= document.getElementById("fileInput");
const pageNumEl= document.getElementById("pageNum");
const pageCountEl = document.getElementById("pageCount");
const zoomLevelEl = document.getElementById("zoomLevel");
const lumSlider = document.getElementById("lum");

let pdfDoc = null;
let scale = 1;            // échelle CSS logique
let baseWidth = 0;        // largeur d'une page à échelle 1
let pages = [];           // {wrap, canvas, num, rendered, renderTask}
let observer = null;
let zoomTimer = null;

/* ---------- Préférences (sans erreur si stockage indisponible) ---------- */
const prefs = {
  get(k, d){ try { return localStorage.getItem("liseuse:"+k) ?? d; } catch { return d; } },
  set(k, v){ try { localStorage.setItem("liseuse:"+k, v); } catch {} }
};

/* ---------- Mode & luminosité ---------- */
function setMode(mode){
  viewer.dataset.mode = mode;
  document.querySelectorAll(".dimmer .modes button").forEach(b =>
    b.setAttribute("aria-pressed", String(b.dataset.mode === mode)));
  prefs.set("mode", mode);
}
document.querySelectorAll(".dimmer .modes button").forEach(b =>
  b.addEventListener("click", () => setMode(b.dataset.mode)));

function setLum(v){
  document.documentElement.style.setProperty("--lum", (v/100).toFixed(2));
  prefs.set("lum", v);
}
lumSlider.addEventListener("input", () => setLum(lumSlider.value));

/* Restauration des préférences */
setMode(prefs.get("mode", "sombre"));
lumSlider.value = prefs.get("lum", "85");
setLum(lumSlider.value);

/* ---------- Ouverture de fichier ---------- */
document.getElementById("openBtn").addEventListener("click", () => fileInput.click());
document.getElementById("openBtn2").addEventListener("click", () => fileInput.click());
fileInput.addEventListener("change", () => {
  if (fileInput.files[0]) loadFile(fileInput.files[0]);
});

["dragover","dragenter"].forEach(ev =>
  document.body.addEventListener(ev, e => { e.preventDefault(); dropzone.classList.add("dragover"); }));
["dragleave","drop"].forEach(ev =>
  document.body.addEventListener(ev, e => { e.preventDefault(); dropzone.classList.remove("dragover"); }));
document.body.addEventListener("drop", e => {
  const f = e.dataTransfer.files[0];
  if (f && f.type === "application/pdf") loadFile(f);
});

async function loadFile(file){
  const buf = await file.arrayBuffer();
  if (pdfDoc) { pdfDoc.destroy(); }
  pdfDoc = await pdfjsLib.getDocument({ data: buf }).promise;

  document.title = file.name.replace(/\.pdf$/i,"") + " — Liseuse";
  pageCountEl.textContent = pdfDoc.numPages;
  dropzone.classList.add("hidden");
  viewer.classList.remove("hidden");

  await buildPages();
  fitToWidth();
  viewer.focus();
}

/* ---------- Construction des pages (rendu paresseux) ---------- */
async function buildPages(){
  viewer.innerHTML = "";
  pages = [];
  if (observer) observer.disconnect();

  const first = await pdfDoc.getPage(1);
  baseWidth = first.getViewport({ scale: 1 }).width;

  for (let i = 1; i <= pdfDoc.numPages; i++){
    const wrap = document.createElement("div");
    wrap.className = "page-wrap";
    wrap.dataset.page = i;
    const canvas = document.createElement("canvas");
    wrap.appendChild(canvas);
    viewer.appendChild(wrap);
    pages.push({ wrap, canvas, num: i, rendered: false, renderTask: null });
  }

  // Dimensions provisoires (ratio exact calculé au rendu)
  await sizePlaceholders();

  observer = new IntersectionObserver(entries => {
    for (const e of entries){
      const p = pages[Number(e.target.dataset.page) - 1];
      if (e.isIntersecting){
        renderPage(p);
        if (e.intersectionRatio > 0.4) pageNumEl.textContent = p.num;
      }
    }
  }, { root: viewer, rootMargin: "600px 0px", threshold: [0, 0.4] });

  pages.forEach(p => observer.observe(p.wrap));
}

async function sizePlaceholders(){
  for (const p of pages){
    const page = await pdfDoc.getPage(p.num);
    const vp = page.getViewport({ scale });
    p.wrap.style.width  = vp.width + "px";
    p.wrap.style.height = vp.height + "px";
    p.vpRatio = vp.height / vp.width;
  }
}

/* ---------- Rendu net : canvas à scale × devicePixelRatio ---------- */
async function renderPage(p){
  if (p.rendered || p.rendering) return;
  p.rendering = true;
  try {
    const page = await pdfDoc.getPage(p.num);
    const dpr = window.devicePixelRatio || 1;
    const vp = page.getViewport({ scale: scale * dpr });

    p.canvas.width  = Math.floor(vp.width);
    p.canvas.height = Math.floor(vp.height);
    p.wrap.style.width  = Math.floor(vp.width / dpr) + "px";
    p.wrap.style.height = Math.floor(vp.height / dpr) + "px";

    const ctx = p.canvas.getContext("2d");
    p.renderTask = page.render({ canvasContext: ctx, viewport: vp });
    await p.renderTask.promise;
    p.rendered = true;
  } catch(e){
    if (e?.name !== "RenderingCancelledException") console.error(e);
  } finally {
    p.rendering = false;
  }
}

/* ---------- Zoom ---------- */
function setScale(newScale, anchorRatio){
  newScale = Math.min(5, Math.max(0.3, newScale));
  if (Math.abs(newScale - scale) < 0.001) return;

  // conserver la position de lecture
  const ratio = anchorRatio ?? (viewer.scrollTop / Math.max(1, viewer.scrollHeight));
  scale = newScale;
  zoomLevelEl.textContent = Math.round(scale / fitScale() * 100) + " %";

  // redimensionner immédiatement (le CSS étire l'ancien rendu, pas de saut)
  pages.forEach(p => {
    p.wrap.style.width = Math.floor(baseWidth * scale) + "px";
    p.wrap.style.height = Math.floor(baseWidth * scale * (p.vpRatio || 1.414)) + "px";
    p.rendered = false;
    if (p.renderTask) { try { p.renderTask.cancel(); } catch {} }
  });
  viewer.scrollTop = ratio * viewer.scrollHeight;

  // re-render net, léger debounce pour les zooms rapides
  clearTimeout(zoomTimer);
  zoomTimer = setTimeout(() => {
    const vTop = viewer.scrollTop, vBottom = vTop + viewer.clientHeight;
    pages.forEach(p => {
      const top = p.wrap.offsetTop, bottom = top + p.wrap.offsetHeight;
      if (bottom > vTop - 600 && top < vBottom + 600) renderPage(p);
    });
  }, 120);
}

function fitScale(){
  const avail = viewer.clientWidth - 48;
  return baseWidth ? avail / baseWidth : 1;
}
function fitToWidth(){
  scale = 0; // force le recalcul
  setScale(fitScale(), viewer.scrollTop / Math.max(1, viewer.scrollHeight));
}

document.getElementById("zoomIn").addEventListener("click", () => setScale(scale * 1.2));
document.getElementById("zoomOut").addEventListener("click", () => setScale(scale / 1.2));
document.getElementById("fitWidth").addEventListener("click", fitToWidth);

/* Ctrl + molette = zoom */
viewer.addEventListener("wheel", e => {
  if (!e.ctrlKey) return;
  e.preventDefault();
  setScale(scale * (e.deltaY < 0 ? 1.1 : 1/1.1));
}, { passive: false });

/* ---------- Navigation ---------- */
function goToPage(n){
  n = Math.min(pdfDoc?.numPages || 1, Math.max(1, n));
  const p = pages[n-1];
  if (p) viewer.scrollTo({ top: p.wrap.offsetTop - 24 });
}
document.getElementById("prevBtn").addEventListener("click", () =>
  goToPage(Number(pageNumEl.textContent) - 1));
document.getElementById("nextBtn").addEventListener("click", () =>
  goToPage(Number(pageNumEl.textContent) + 1));

document.addEventListener("keydown", e => {
  if (!pdfDoc || e.target.tagName === "INPUT") return;
  switch (e.key){
    case "+": case "=": setScale(scale * 1.2); break;
    case "-": setScale(scale / 1.2); break;
    case "0": fitToWidth(); break;
    case "ArrowLeft": goToPage(Number(pageNumEl.textContent) - 1); break;
    case "ArrowRight": goToPage(Number(pageNumEl.textContent) + 1); break;
    case "d": setMode("sombre"); break;
    case "t": setMode("tamise"); break;
    case "o": setMode("original"); break;
  }
});

/* Recalcul si la fenêtre change (avec position conservée) */
let resizeTimer;
window.addEventListener("resize", () => {
  if (!pdfDoc) return;
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(fitToWidth, 200);
});
</script>
</body>
</html>
